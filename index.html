<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match de Figuritas Mundial 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
    
    <style>
        :root { --primary: #005c98; --secondary: #6c757d; --success: #28a745; --danger: #dc3545; --yellow: #ffc107; --wsp: #25D366; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; padding: 20px; max-width: 1000px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e9ecef; }
        textarea { width: 100%; height: 160px; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; font-family: monospace; box-sizing: border-box; margin-top: 5px; font-size: 13px; resize: vertical;}
        input { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px;}
        button { width: 100%; padding: 10px 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: filter 0.2s; font-size: 14px;}
        button:hover { filter: brightness(1.1); }
        
        .btn-primary { background-color: var(--primary); }
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }
        .btn-secondary { background-color: var(--secondary); }
        .btn-yellow { background-color: var(--yellow); color: #333; }
        .btn-wsp { background-color: var(--wsp); font-size: 16px; margin-top: 20px; padding: 15px;}
        .btn-wsp-small { background-color: var(--wsp); color: white; }
        .btn-amigo { background-color: #17a2b8; width: auto; font-size: 13px; padding: 8px 12px; margin-right: 5px; margin-bottom: 5px; display: inline-block;}
        
        .resultados { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-top: 20px; display: none; border: 1px solid #e9ecef;}
        h3 { color: #333; border-bottom: 2px solid var(--primary); padding-bottom: 8px; margin-top: 0; }
        .status { text-align: center; font-weight: bold; margin-top: 10px; font-size: 13px; }
        .team-row { margin: 5px 0; font-size: 15px;}
        .team-row b { margin-right: 5px; }
        
        .footer { text-align: center; margin-top: 40px; color: #6c757d; font-size: 14px; padding-top: 20px; border-top: 1px solid #dee2e6;}
        .footer a { color: var(--primary); font-weight: bold; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 30px;">
        <h2 style="color: #333; margin-bottom: 5px;">
            <a href="#" onclick="window.location.href=window.location.pathname; return false;" style="text-decoration: none; color: #333; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">
                ⚽ Match de Figuritas Mundial 2026 ⚽
            </a>
        </h2>
        <p style="font-size: 14px; color: #6c757d; margin-top: 0;">
            Con el poder de <a href="https://www.figuritas.app/es/descargar" target="_blank" style="color: var(--primary); font-weight: bold; text-decoration: none;">Figuritas App</a> (App externa)
        </p>
    </div>

    <div class="grid">
        <div class="box">
            <h3>👤 Mi Perfil</h3>
            <label><b>Tu Usuario:</b></label>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="miUsuario" placeholder="Ej: Luis2026" style="margin-bottom: 0;">
                <button id="btnCargarPerfil" class="btn-yellow" style="width: auto; white-space: nowrap; margin-top: 0;">⬇️ Cargar</button>
            </div>
            
            <label><b>Mis Amigos Habituales (separados por coma):</b></label>
            <input type="text" id="misAmigos" placeholder="Ej: Guada, Pilar, FedeQatar">
            
            <label><b>Mis Figuritas:</b></label>
            <textarea id="miLista" placeholder="Pegá acá el listado de tu App de figuritas..."></textarea>
            
            <button id="btnGuardarNube" class="btn-success" style="margin-top: 10px;">☁️ Guardar en la Nube</button>
            <div id="statusMiNube" class="status"></div>

            <div style="margin-top: 20px; border-top: 1px solid #dee2e6; padding-top: 15px;">
                <label style="font-size: 13px; color: #495057;"><b>📢 Compartir mi link público:</b></label>
                <div style="display: flex; gap: 5px; margin-top: 5px; margin-bottom: 15px;">
                    <input type="text" id="linkCompartir" readonly style="margin: 0; font-size: 12px; background: #e9ecef; color: #495057;">
                    <button id="btnCompartirPublico" class="btn-wsp-small" style="margin: 0; width: auto; font-size: 12px; padding: 10px;">📲 WhatsApp</button>
                </div>

                <label style="font-size: 13px; color: #dc3545;"><b>🔒 Mi Link Privado (Tus favoritos):</b></label>
                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <input type="text" id="linkPrivado" readonly style="margin: 0; font-size: 12px; background: #f8d7da; color: #721c24; border-color: #f5c6cb;">
                    <button id="btnCopiarPrivado" class="btn-secondary" style="margin: 0; width: auto; font-size: 12px; padding: 10px;">📋 Copiar</button>
                </div>
                
                <button id="btnInstalar" class="btn-yellow" style="margin-top: 15px; font-size: 13px;">📱 Crear acceso directo en Android</button>
            </div>
        </div>

        <div class="box">
            <h3>🤝 Intercambio</h3>
            
            <div id="botonesAmigos" style="margin-bottom: 15px;"></div>
            
            <label><b>Buscar usuario en la nube:</b></label>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="amigoUsuario" placeholder="Ej: FedeQatar" style="margin-bottom: 0;">
                <button id="btnBuscarAmigo" class="btn-primary" style="margin: 0; width: auto; white-space: nowrap;">🔍 Buscar</button>
            </div>
            
            <label><b>O pegar texto manualmente:</b></label>
            <textarea id="amigoLista" placeholder="Pegá acá la lista de la otra persona para comparar..."></textarea>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                <button id="btnCompararLocal" class="btn-primary">⚖️ Comparar</button>
                <button id="btnLimpiar" class="btn-danger">🧹 Limpiar</button>
            </div>
            <div id="statusAmigo" class="status"></div>
        </div>
    </div>

    <div id="resultados" class="resultados">
        <h3 id="tituloMeSirven">✅ Te sirven:</h3>
        <div id="meSirven" style="margin-bottom: 25px;"></div>
        
        <h3 id="tituloLeSirven">🎁 Le sirven:</h3>
        <div id="leSirven"></div>
        
        <button id="btnCopiarWhatsApp" class="btn-wsp">📲 Compartir Match por WhatsApp</button>
    </div>

    <div class="footer">
        <p>Herramienta web gratuita para potenciar tus intercambios.</p>
        <p style="margin-top: 15px;">Contacto: <a href="https://web.telegram.org/k/#@luishacevedo" target="_blank">Telegram @luishacevedo</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPGcn1zq1NPTrfcAZ1a1xLIjZ6IwDwMoY",
            authDomain: "match-figuritas-app.firebaseapp.com",
            databaseURL: "https://match-figuritas-app-default-rtdb.firebaseio.com",
            projectId: "match-figuritas-app",
            storageBucket: "match-figuritas-app.firebasestorage.app",
            messagingSenderId: "13972953348",
            appId: "1:13972953348:web:2d60c62f4bd2e5e0ac5851"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let ultimoMatchMeSirven = {};
        let ultimoMatchLeSirven = {};
        let ultimoNombreAmigo = "";

        document.getElementById('btnCargarPerfil').addEventListener('click', cargarMiPerfil);
        document.getElementById('btnGuardarNube').addEventListener('click', guardarMisDatos);
        document.getElementById('btnBuscarAmigo').addEventListener('click', cargarYComparar);
        document.getElementById('btnCompararLocal').addEventListener('click', compararListasLocales);
        document.getElementById('btnLimpiar').addEventListener('click', limpiarBuscador);
        
        document.getElementById('btnCompartirPublico').addEventListener('click', compartirWhatsAppPublico);
        document.getElementById('btnCopiarPrivado').addEventListener('click', () => copiarLink('linkPrivado', 'btnCopiarPrivado', '#6c757d', true));
        document.getElementById('btnCopiarWhatsApp').addEventListener('click', copiarTextoWhatsApp);
        document.getElementById('btnInstalar').addEventListener('click', mostrarInstruccionesAndroid);

        function parsearTexto(texto) {
            let datos = { faltan: {}, repetidas: {} };
            let seccionActual = null;
            let lineas = texto.split('\n');

            lineas.forEach(linea => {
                if (linea.includes('Me faltan')) { seccionActual = 'faltan'; } 
                else if (linea.includes('Repetidas')) { seccionActual = 'repetidas'; } 
                else if (seccionActual && linea.includes(':')) {
                    let partes = linea.split(':');
                    let equipo = partes[0].trim();
                    let numeros = partes[1].split(',').map(n => n.trim()).filter(n => n !== "");
                    if (equipo && numeros.length > 0) { datos[seccionActual][equipo] = numeros; }
                }
            });
            return datos;
        }

        function encontrarInterseccion(buscadas, ofrecidas) {
            let matches = {};
            for (let equipo in buscadas) {
                if (ofrecidas[equipo]) {
                    let comunes = buscadas[equipo].filter(num => ofrecidas[equipo].includes(num));
                    if (comunes.length > 0) matches[equipo] = comunes;
                }
            }
            return matches;
        }

        function contarTotal(datos) {
            return Object.values(datos).reduce((acc, curr) => acc + curr.length, 0);
        }

        function renderizarResultados(divId, datos) {
            let div = document.getElementById(divId);
            div.innerHTML = '';
            let hayMatches = false;
            for (let equipo in datos) {
                hayMatches = true;
                let fila = document.createElement('div');
                fila.className = 'team-row';
                fila.innerHTML = `<b>${equipo}:</b> ${datos[equipo].join(', ')}`;
                div.appendChild(fila);
            }
            if (!hayMatches) div.innerHTML = '<p style="color: #856404; background-color: #fff3cd; padding: 10px; border-radius: 5px;">No hay coincidencias en esta lista. 😢</p>';
        }

        function ejecutarComparacion(textoMio, textoAmigo, nombreAmigo = "TU AMIGO") {
            let misDatos = parsearTexto(textoMio);
            let amigoDatos = parsearTexto(textoAmigo);
            
            ultimoMatchMeSirven = encontrarInterseccion(misDatos.faltan, amigoDatos.repetidas);
            ultimoMatchLeSirven = encontrarInterseccion(amigoDatos.faltan, misDatos.repetidas);
            ultimoNombreAmigo = nombreAmigo;

            let cantMeSirven = contarTotal(ultimoMatchMeSirven);
            let cantLeSirven = contarTotal(ultimoMatchLeSirven);

            renderizarResultados('meSirven', ultimoMatchMeSirven);
            renderizarResultados('leSirven', ultimoMatchLeSirven);
            
            document.getElementById('tituloMeSirven').innerHTML = `✅ A VOS te sirven ${cantMeSirven} figuritas de ${nombreAmigo}:`;
            document.getElementById('tituloLeSirven').innerHTML = `🎁 A ${nombreAmigo} le sirven ${cantLeSirven} figuritas tuyas:`;
            
            document.getElementById('resultados').style.display = 'block';
        }

        function renderizarBotonesAmigos() {
            let container = document.getElementById('botonesAmigos');
            container.innerHTML = '';
            let amigosTexto = document.getElementById('misAmigos').value;
            if (!amigosTexto) return;
            
            let amigos = amigosTexto.split(',').map(a => a.trim()).filter(a => a !== "");
            amigos.forEach(amigo => {
                let btn = document.createElement('button');
                btn.className = 'btn-amigo';
                btn.innerText = `🆚 ${amigo}`;
                btn.onclick = () => {
                    document.getElementById('amigoUsuario').value = amigo;
                    cargarYComparar();
                };
                container.appendChild(btn);
            });
        }

        function actualizarLinkDirecto(usuario) {
            let urlBase = window.location.origin + window.location.pathname;
            document.getElementById('linkCompartir').value = urlBase + '?buscar=' + encodeURIComponent(usuario);
            document.getElementById('linkPrivado').value = urlBase + '?u=' + encodeURIComponent(usuario);
        }

        function compartirWhatsAppPublico() {
            let link = document.getElementById('linkCompartir').value;
            if (!link) { alert("Primero guardá o cargá tu perfil para generar tu link."); return; }
            
            let texto = `⚽ ¡Hola! Fijate si nos sirven figuritas para cambiar.\n\nEntrá a mi link, cruzá tus repetidas con las mías automáticamente y veamos el Match acá:\n👉 ${link}`;
            
            // Abrimos WhatsApp de forma síncrona
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`, '_blank');
            // Intentamos copiar en segundo plano por las dudas
            navigator.clipboard.writeText(texto).catch(e => console.log("Copia secundaria falló", e));
        }

        function copiarLink(inputId, btnId, colorOriginal, esPrivado = false) {
            let inputLink = document.getElementById(inputId);
            if (!inputLink.value) { alert("Primero guardá o cargá tu perfil para generar el link."); return; }
            inputLink.select();
            inputLink.setSelectionRange(0, 99999);
            
            navigator.clipboard.writeText(inputLink.value).then(() => {
                if (esPrivado) {
                    alert("¡Link Privado copiado!\n\n⚠️ ADVERTENCIA: NO compartas este link. Si se lo pasás a alguien, esa persona podrá modificar o borrar tu lista de figuritas en la nube. Guardalo solo en tus favoritos.");
                }
                
                let btn = document.getElementById(btnId);
                btn.innerText = "¡Copiado!";
                btn.style.backgroundColor = "#28a745";
                
                setTimeout(() => { 
                    btn.innerText = esPrivado ? "📋 Copiar Privado" : "📋 Copiar Link"; 
                    btn.style.backgroundColor = colorOriginal; 
                }, 2000);
            });
        }

        function mostrarInstruccionesAndroid() {
            let linkPrivado = document.getElementById('linkPrivado').value;
            if(!linkPrivado) {
                alert("Primero guardá o cargá tu perfil para generar tu usuario.");
                return;
            }
            alert("Para instalar la Web App en Android:\n\n1. Asegurate de abrir tu 'Link Privado' en Chrome.\n2. Tocá los 3 puntitos (⋮) arriba a la derecha del navegador.\n3. Elegí 'Agregar a la pantalla principal'.\n\n¡Listo! Te quedará el ícono en tu celular y siempre abrirá con tu usuario cargado.");
        }

        function formatearDiccionario(datos) {
            let texto = "";
            let hayDatos = false;
            for (let equipo in datos) {
                hayDatos = true;
                texto += `• *${equipo}:* ${datos[equipo].join(', ')}\n`;
            }
            return hayDatos ? texto : "Nada por ahora 😢\n";
        }

        function copiarTextoWhatsApp() {
            let miUsuario = document.getElementById('miUsuario').value.trim() || "MÍ";
            let cantMe = contarTotal(ultimoMatchMeSirven);
            let cantLe = contarTotal(ultimoMatchLeSirven);
            
            let texto = `⚽ *MATCH DE FIGURITAS* ⚽\n\n`;
            texto += `✅ *${cantMe} figuritas para ${miUsuario.toUpperCase()} de ${ultimoNombreAmigo}:*\n` + formatearDiccionario(ultimoMatchMeSirven);
            texto += `\n🎁 *${cantLe} figuritas para ${ultimoNombreAmigo} de ${miUsuario.toUpperCase()}:*\n` + formatearDiccionario(ultimoMatchLeSirven);
            texto += `\n🔍 _Cruzá tus repetidas acá:_ https://luishacevedo.github.io/match-figuritas/`;

            // Abrimos WhatsApp directamente
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`, '_blank');
            // Intentamos copiar al portapapeles por las dudas
            navigator.clipboard.writeText(texto).catch(e => console.log(e));

            let btnWsp = document.getElementById('btnCopiarWhatsApp');
            btnWsp.innerText = "¡Abriendo WhatsApp! ✅";
            btnWsp.style.backgroundColor = "#128C7E";
            setTimeout(() => { btnWsp.innerText = "📲 Compartir Match por WhatsApp"; btnWsp.style.backgroundColor = "#25D366"; }, 3000);
        }

        async function cargarMiPerfil() {
            let usuario = document.getElementById('miUsuario').value.trim();
            let status = document.getElementById('statusMiNube');
            if (!usuario) { alert("Ingresá tu usuario primero para cargar el perfil."); return; }
            status.style.color = "#005c98"; status.innerText = "Cargando...";

            try {
                const snapshot = await get(child(ref(db), `usuarios/${usuario}`));
                if (snapshot.exists()) {
                    let datos = snapshot.val();
                    document.getElementById('miLista').value = datos.textoOriginal || "";
                    document.getElementById('misAmigos').value = datos.amigos || "";
                    renderizarBotonesAmigos();
                    actualizarLinkDirecto(usuario);
                    status.style.color = "green"; status.innerText = "¡Perfil cargado!";
                } else {
                    status.style.color = "red"; status.innerText = "No se encontró el perfil.";
                }
            } catch (error) {
                console.error(error);
                status.style.color = "red"; status.innerText = "Error de conexión.";
            }
        }

        async function guardarMisDatos() {
            let usuario = document.getElementById('miUsuario').value.trim();
            let texto = document.getElementById('miLista').value.trim();
            let amigos = document.getElementById('misAmigos').value.trim();
            let status = document.getElementById('statusMiNube');

            if (!usuario || !texto) { alert("Por favor, ingresá tu usuario y el texto de figuritas."); return; }
            status.style.color = "#005c98"; status.innerText = "Guardando...";
            
            try {
                await set(ref(db, 'usuarios/' + usuario), {
                    textoOriginal: texto,
                    amigos: amigos,
                    ultimaActualizacion: new Date().toLocaleString()
                });
                renderizarBotonesAmigos();
                actualizarLinkDirecto(usuario);
                status.style.color = "green"; status.innerText = "¡Guardado con éxito en la nube!";
            } catch (error) {
                console.error(error);
                status.style.color = "red"; status.innerText = "Error al guardar.";
            }
        }

        async function cargarYComparar() {
            let textoMio = document.getElementById('miLista').value.trim();
            let usuarioAmigo = document.getElementById('amigoUsuario').value.trim();
            let status = document.getElementById('statusAmigo');

            if (!textoMio) { alert("Primero cargá o pegá tu propia lista a la izquierda."); return; }
            if (!usuarioAmigo) { alert("Ingresá el usuario que querés buscar."); return; }

            status.style.color = "#005c98"; status.innerText = `Buscando a ${usuarioAmigo}...`;

            try {
                const snapshot = await get(child(ref(db), `usuarios/${usuarioAmigo}`));
                if (snapshot.exists()) {
                    let datosAmigo = snapshot.val();
                    document.getElementById('amigoLista').value = datosAmigo.textoOriginal;
                    ejecutarComparacion(textoMio, datosAmigo.textoOriginal, usuarioAmigo);
                    status.style.color = "green"; status.innerText = `¡Lista cargada desde la nube!`;
                } else {
                    status.style.color = "red"; status.innerText = `Usuario no encontrado.`;
                }
            } catch (error) {
                console.error(error);
                status.style.color = "red"; status.innerText = "Error de conexión.";
            }
        }

        function compararListasLocales() {
            let textoMio = document.getElementById('miLista').value.trim();
            let textoAmigo = document.getElementById('amigoLista').value.trim();
            if (!textoMio || !textoAmigo) { alert("Asegurate de tener ambas listas pegadas para comparar."); return; }
            
            let nomAmigo = document.getElementById('amigoUsuario').value.trim() || "TU AMIGO";
            ejecutarComparacion(textoMio, textoAmigo, nomAmigo);
            document.getElementById('statusAmigo').innerText = "";
        }

        function limpiarBuscador() {
            document.getElementById('amigoUsuario').value = '';
            document.getElementById('amigoLista').value = '';
            document.getElementById('statusAmigo').innerText = '';
            document.getElementById('resultados').style.display = 'none';
        }

        // CARGA AUTOMÁTICA POR URL AL ABRIR LA PÁGINA
        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 1. Link Privado
            if (urlParams.get('u')) {
                document.getElementById('miUsuario').value = urlParams.get('u');
                await cargarMiPerfil();
            }

            // 2. Link Público
            if (urlParams.get('buscar')) {
                let userAmigo = urlParams.get('buscar');
                document.getElementById('amigoUsuario').value = userAmigo;
                let status = document.getElementById('statusAmigo');
                status.style.color = "#005c98"; status.innerText = `Cargando lista compartida...`;
                
                try {
                    const snapshot = await get(child(ref(db), `usuarios/${userAmigo}`));
                    if (snapshot.exists()) {
                        document.getElementById('amigoLista').value = snapshot.val().textoOriginal;
                        status.style.color = "green"; 
                        status.innerText = `¡Lista de ${userAmigo} descargada! Ingresá tu perfil a la izquierda para comparar.`;
                    } else {
                        status.style.color = "red"; status.innerText = `No se encontró el usuario.`;
                    }
                } catch (error) {
                    console.error(error);
                    status.style.color = "red"; status.innerText = "Error de descarga.";
                }
            }
        };
    </script>
</body>
</html>
