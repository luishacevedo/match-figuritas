<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match de Figuritas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
    
    <style>
        :root { --primary: #005c98; --secondary: #6c757d; --success: #28a745; --danger: #dc3545; --wsp: #25D366; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; padding: 20px; max-width: 950px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eef; }
        textarea { width: 100%; height: 160px; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; font-family: monospace; box-sizing: border-box; margin-top: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 8px; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        .btn-success { background-color: var(--success); }
        .btn-yellow { background-color: #ffc107; color: #333; margin-bottom: 15px; }
        .btn-primary { background-color: var(--primary); }
        .btn-danger { background-color: var(--danger); }
        .btn-wsp { background-color: var(--wsp); font-size: 16px; margin-top: 20px; }
        .resultados { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; display: none; }
        h3 { color: #333; border-bottom: 2px solid #005c98; padding-bottom: 5px; margin-top: 0; }
        .team-row { margin: 5px 0; }
        .team-name { font-weight: bold; margin-right: 10px; }
        .footer { text-align: center; margin-top: 40px; color: #666; font-size: 14px; }
        .footer a { color: var(--primary); font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">⚽ Match de Figuritas Mundial 2026</h2>

    <div class="grid">
        <div class="box">
            <h3>👤 Mi Perfil</h3>
            <label><b>Usuario:</b></label>
            <input type="text" id="miUsuario" placeholder="Tu usuario...">
            <button id="btnCargarPerfil" class="btn-yellow">⬇️ Cargar mis datos</button>
            <label><b>Mis Amigos (separados por coma):</b></label>
            <input type="text" id="misAmigos" placeholder="Ej: Guada, Pilar, Fede">
            <label><b>Mis Figuritas:</b></label>
            <textarea id="miLista" placeholder="Pegá acá tu lista..."></textarea>
            <button id="btnGuardarNube" class="btn-success">☁️ Guardar en la Nube</button>
            <div id="statusMiNube" style="font-size: 12px; text-align: center; margin-top: 5px;"></div>
        </div>

        <div class="box">
            <h3>🤝 Intercambio</h3>
            <div id="botonesAmigos" style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;"></div>
            <label><b>Pegar figuritas de otro:</b></label>
            <textarea id="amigoLista" placeholder="Pegá acá la lista de tu amigo..."></textarea>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="btnBuscarAmigo" class="btn-primary">🔍 Comparar</button>
                <button id="btnLimpiar" class="btn-danger">🧹 Limpiar</button>
            </div>
            <div id="statusAmigo" style="font-size: 12px; text-align: center; margin-top: 5px;"></div>
        </div>
    </div>

    <div id="resultados" class="resultados">
        <h3 id="tituloMeSirven">✅ Te sirven:</h3>
        <div id="meSirven"></div>
        <h3 id="tituloLeSirven">🎁 Le sirven:</h3>
        <div id="leSirven"></div>
        <button id="btnCopiarWhatsApp" class="btn-wsp">📲 Copiar listado para WhatsApp</button>
    </div>

    <div class="footer">
        <p>Herramienta para potenciar tus intercambios.</p>
        <p>Contacto: <a href="https://web.telegram.org/k/#@luishacevedo" target="_blank">Telegram @luishacevedo</a> | <a href="TU_LINKEDIN" target="_blank">LinkedIn</a></p>
    </div>

            ultimoMatchLeSirven = encontrarInterseccion(amigoDatos.faltan, misDatos.repetidas);
            ultimoNombreAmigo = nombreAmigo;

        // --- (MANTENER TODOS LOS EVENT LISTENERS Y FUNCIONES DE FIREBASE QUE YA TENÍAS) ---
    </script>
</body>
</html>
