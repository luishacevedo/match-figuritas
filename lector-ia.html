<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector de Imágenes con Gemini IA (Seguro)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; max-width: 600px; margin: auto; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #e9ecef; }
        textarea { width: 100%; height: 250px; margin-top: 15px; font-family: monospace; font-size: 13px; padding: 10px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 8px; resize: vertical; }
        input[type="password"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; font-size: 14px; }
        input[type="file"] { border: 1px dashed #ced4da; background: #f8f9fa; }
        button { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;}
        button:hover { filter: brightness(1.1); }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        .status { margin: 15px 0; font-size: 14px; font-weight: bold; color: #005c98; text-align: center; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="margin-top: 0; color: #005c98;">🤖 Lector Visual con IA</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 20px;">Subí la captura de una infografía para extraer las listas limpias.</p>
        
        <label style="font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px;">🔑 Tu Gemini API Key:</label>
        <input type="password" id="apiKeyInput" placeholder="Pegá tu API Key acá (se guarda solo en tu navegador)...">

        <label style="font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px;">📸 Seleccionar Imagen:</label>
        <input type="file" id="imagenInput" accept="image/*">
        
        <button id="btnProcesar">Procesar Imagen con IA</button>
        <div id="statusTxt" class="status"></div>
        
        <textarea id="resultado" placeholder="El resultado limpio aparecerá acá..." readonly></textarea>
    </div>

    <script>
        // Al cargar la página, recuperamos la llave si ya fue guardada antes
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
            }
        });

        document.getElementById('btnProcesar').addEventListener('click', async () => {
            const input = document.getElementById('imagenInput');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const statusTxt = document.getElementById('statusTxt');
            const resultado = document.getElementById('resultado');
            
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert("Por favor, ingresá tu Gemini API Key.");
                return;
            }

            if (input.files.length === 0) {
                alert("Por favor, elegí una imagen primero.");
                return;
            }

            // Guardamos la llave localmente para comodidad del usuario
            localStorage.setItem('gemini_api_key', apiKey);

            const file = input.files[0];
            statusTxt.innerText = "⏳ Convirtiendo imagen...";
            
            try {
                const base64Image = await fileToBase64(file);
                const base64Data = base64Image.split(',')[1];
                
                // SOLUCIÓN PARA .JFIF y tipos vacíos
                let mimeType = file.type;
                if (!mimeType || mimeType.includes('jfif')) {
                    mimeType = 'image/jpeg';
                }

                // URL de la API usando la llave dinámica ingresada en la pantalla
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                const prompt = `
                Sos un asistente experto en extraer datos de álbumes de figuritas de fútbol. Analizá esta imagen.
                REGLAS ESTRICTAS:
                1. Ignorá banderas, colores, fotos de jugadores, escudos y textos publicitarios.
                2. Agrupá los números bajo los títulos exactos: "Me faltan" y "Repetidas".
                3. Convertí los nombres de los países o equipos a sus siglas oficiales de 3 letras (ejemplo: ARGENTINA = ARG, BRASIL = BRA, ESPAÑA = ESP, URUGUAY = URU, JAPÓN = JPN).
                4. Si ves Trofeos, Logos, Estadios o FIFA, usá la sigla FWC. Si ves Coca Cola, usá la sigla CC.
                5. Respondé EXCLUSIVAMENTE con las siglas y los números separados por comas. No agregues introducciones ni saludos.

                Formato requerido:
                Me faltan
                ARG: 1, 4, 10
                FWC: 3, 5

                Repetidas
                MEX: 2, 19
                `;

                const requestBody = {
                    "contents": [{
                        "parts": [
                            {"text": prompt},
                            {
                                "inline_data": {
                                    "mime_type": mimeType,
                                    "data": base64Data
                                }
                            }
                        ]
                    }]
                };

                statusTxt.innerText = "🧠 La IA está analizando las columnas de la imagen...";
                document.getElementById('btnProcesar').disabled = true;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error("Error en la API. Verificá que tu API Key sea válida y no haya sido revocada.");
                }

                const data = await response.json();
                const textoFinal = data.candidates[0].content.parts[0].text;
                
                statusTxt.innerText = "✅ ¡Extracción completada con éxito!";
                resultado.value = textoFinal.trim();

            } catch (error) {
                console.error(error);
                statusTxt.innerText = "❌ Error en el proceso.";
                alert(error.message);
            } finally {
                document.getElementById('btnProcesar').disabled = false;
            }
        });

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
    </script>
</body>
</html>
