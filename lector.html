<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decodificador QR - Figuritas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            padding: 20px; 
            max-width: 600px; 
            margin: auto; 
        }
        .box { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            border: 1px solid #e9ecef;
            text-align: center;
        }
        textarea { 
            width: 100%; 
            height: 350px; 
            margin-top: 15px; 
            font-family: monospace; 
            font-size: 13px; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ced4da;
            border-radius: 8px;
            resize: vertical;
        }
        input[type="file"] { 
            margin-top: 10px; 
            margin-bottom: 10px;
        }
        .instrucciones {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="margin-top: 0; color: #005c98;">🔍 Lector y Descompresor QR</h2>
        <p class="instrucciones">Elegí una imagen de tu PC/Celular o hacé click acá y apretá <b>Ctrl+V</b> para pegar el QR.</p>
        
        <input type="file" id="fileInput" accept="image/*">
        
        <textarea id="output" placeholder="Acá aparecerá la lista decodificada..." readonly></textarea>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) procesarImagen(e.target.files[0]);
        });

        window.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    procesarImagen(items[i].getAsFile());
                    break;
                }
            }
        });

        function procesarImagen(file) {
            output.value = "⏳ Escaneando imagen...";
            const reader = new FileReader();
            
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    
                    if (code && code.data) {
                        output.value = "🔄 QR Detectado. Descomprimiendo archivos...";
                        decodificarCarga(code.data);
                    } else {
                        output.value = "❌ No se pudo leer un código QR en la imagen.";
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function decodificarCarga(rawData) {
            try {
                // Separa la cadena por el punto y coma (cada uno es un archivo GZIP)
                const chunks = rawData.split(';');
                let textoFinal = "";

                chunks.forEach((chunk, index) => {
                    // LIMPIEZA EXTREMA: Conserva solo los caracteres válidos de Base64.
                    // Esto destruye el λ, la ~, saltos de línea y caracteres invisibles.
                    const b64Limpio = chunk.replace(/[^A-Za-z0-9+\/=]/g, '');
                    
                    // Si el pedazo quedó vacío tras la limpieza, lo ignoramos
                    if (!b64Limpio) return;
                    
                    // 1. Decodifica el Base64 limpio a binario
                    const binaryString = atob(b64Limpio);
                    
                    // 2. Lo convierte al formato Uint8Array que necesita Pako
                    const charArray = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        charArray[i] = binaryString.charCodeAt(i);
                    }

                    // 3. Descomprime el GZIP a Texto
                    const textoDescomprimido = pako.ungzip(charArray, { to: 'string' });
                    
                    // 4. Lo sumamos al resultado de la pantalla
                    textoFinal += textoDescomprimido + "\n\n";
                });
                
                output.value = textoFinal.trim();
                
            } catch (error) {
                console.error(error);
                output.value = "⚠️ Error al descomprimir los datos.\n\nContenido crudo extraído del QR:\n" + rawData;
            }
        }
    </script>
</body>
</html>
