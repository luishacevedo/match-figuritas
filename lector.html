<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decodificador QR - Figuritas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            padding: 20px; 
            max-width: 600px; 
            margin: auto; 
        }
        .box { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            border: 1px solid #e9ecef;
            text-align: center;
        }
        textarea { 
            width: 100%; 
            height: 350px; 
            margin-top: 15px; 
            font-family: monospace; 
            font-size: 13px; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ced4da;
            border-radius: 8px;
            resize: vertical;
        }
        input[type="file"] { 
            margin-top: 10px; 
            margin-bottom: 10px;
        }
        .instrucciones {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="margin-top: 0; color: #005c98;">🔍 Lector y Descompresor QR</h2>
        <p class="instrucciones">Elegí una imagen de tu PC/Celular o hacé click acá y apretá <b>Ctrl+V</b> para pegar el QR.</p>
        
        <input type="file" id="fileInput" accept="image/*">
        
        <textarea id="output" placeholder="Acá aparecerá la lista de figuritas decodificada..." readonly></textarea>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');

        // 1. Evento para cuando se sube el archivo usando el botón
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                procesarImagen(e.target.files[0]);
            }
        });

        // 2. Evento para escuchar cuando el usuario presiona Ctrl+V (Pegar)
        window.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    procesarImagen(items[i].getAsFile());
                    break;
                }
            }
        });

        // 3. Convertir la imagen a un Canvas y extraer el QR
        function procesarImagen(file) {
            output.value = "⏳ Escaneando imagen...";
            const reader = new FileReader();
            
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    // jsQR hace la magia de encontrar el cuadrado y leer sus datos
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    
                    if (code && code.data) {
                        output.value = "🔄 QR Detectado. Descomprimiendo archivos múltiples...";
                        decodificarCarga(code.data);
                    } else {
                        output.value = "❌ No se pudo encontrar o leer un código QR en la imagen enviada. Asegurate de que se vea nítido.";
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 4. Limpiar, decodificar de Base64 y descomprimir el GZIP múltiple
        function decodificarCarga(rawData) {
            try {
                let cleanData = rawData;
                
                // Remueve la firma "λ~" inicial si existe
                if (cleanData.startsWith('λ~')) {
                    cleanData = cleanData.substring(2);
                }

                // Separa la cadena por el punto y coma (cada elemento es un archivo GZIP distinto)
                const chunks = cleanData.split(';');
                let textoFinal = "";

                // Procesa cada archivo comprimido de forma independiente
                chunks.forEach((chunk, index) => {
                    if (!chunk.trim()) return; // Ignora pedazos vacíos
                    
                    // Decodifica el Base64 a una cadena binaria
                    const binaryString = atob(chunk);
                    
                    // Lo convierte al formato Uint8Array (Requerido por Pako)
                    const charArray = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        charArray[i] = binaryString.charCodeAt(i);
                    }

                    // Descomprime
                    const textoDescomprimido = pako.ungzip(charArray, { to: 'string' });
                    
                    // Lo va sumando al resultado final
                    textoFinal += textoDescomprimido + "\n";
                });
                
                // Muestra la lista final unificada
                output.value = textoFinal.trim();
                
            } catch (error) {
                console.error(error);
                output.value = "⚠️ Error al descomprimir los datos.\n\nContenido crudo extraído del QR:\n" + rawData;
            }
        }
    </script>
</body>
</html>
