<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decodificador QR - Figuritas</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; max-width: 800px; margin: auto; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #e9ecef; text-align: center; }
        textarea { width: 100%; height: 400px; margin-top: 15px; font-family: monospace; font-size: 13px; padding: 10px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 8px; resize: vertical; line-height: 1.5; }
        input[type="file"] { margin-top: 10px; margin-bottom: 10px; }
        .instrucciones { font-size: 14px; color: #6c757d; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="margin-top: 0; color: #005c98;">🔍 Escáner Numérico de QR</h2>
        <p class="instrucciones">Elegí o pegá (Ctrl+V) la imagen del QR para extraer el Byte Array.</p>
        
        <input type="file" id="fileInput" accept="image/*">
        
        <textarea id="output" placeholder="Acá aparecerá la matriz de números crudos..." readonly></textarea>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) procesarImagen(e.target.files[0]);
        });

        window.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    procesarImagen(items[i].getAsFile());
                    break;
                }
            }
        });

        function procesarImagen(file) {
            output.value = "⏳ Escaneando imagen...";
            const reader = new FileReader();
            
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    
                    if (code && code.data) {
                        output.value = "🔄 QR Detectado. Extrayendo matriz de datos (Byte Array)...";
                        decodificarCarga(code.data);
                    } else {
                        output.value = "❌ No se pudo leer un código QR en la imagen.";
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function decodificarCarga(rawData) {
            try {
                const chunks = rawData.split(';');
                let textoFinal = "📊 ANÁLISIS DE DATOS BINARIOS DEL QR:\n==========================================\n\n";

                chunks.forEach((chunk, index) => {
                    const b64Limpio = chunk.replace(/[^A-Za-z0-9+\/=]/g, '');
                    if (!b64Limpio) return;
                    
                    const binaryString = atob(b64Limpio);
                    const charArray = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        charArray[i] = binaryString.charCodeAt(i);
                    }

                    // ACÁ ESTÁ LA MAGIA NUEVA:
                    // Descomprimimos, pero NO lo convertimos a string. 
                    // Lo dejamos como un arreglo de números crudos.
                    const decompressedBytes = pako.ungzip(charArray);
                    
                    // Convertimos a un arreglo normal de Javascript para poder imprimirlo
                    const arrayNumeros = Array.from(decompressedBytes);
                    
                    textoFinal += `📂 BLOQUE ${index + 1}:\n`;
                    textoFinal += `Tamaño: ${arrayNumeros.length} bytes\n`;
                    textoFinal += `Números: [ ${arrayNumeros.join(', ')} ]\n\n`;
                });
                
                output.value = textoFinal.trim();
                
            } catch (error) {
                console.error(error);
                output.value = "⚠️ Error al descomprimir los datos.\n\n" + error;
            }
        }
    </script>
</body>
</html>
